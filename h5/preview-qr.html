<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房产小程序预览码</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .info {
            background: #e8f4fd;
            border-left: 4px solid #1890ff;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .info p {
            margin: 8px 0;
            color: #333;
        }
        .info strong {
            color: #1890ff;
        }
        .steps {
            margin-top: 25px;
        }
        .steps h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .steps ol {
            color: #666;
            line-height: 1.8;
        }
        .warning {
            background: #fff7e6;
            border-left: 4px solid #faad14;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            color: #666;
        }
        .timestamp {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏠 房产小程序预览码</h1>
        
        <div class="info">
            <p><strong>小程序 AppID:</strong> wx6a8d8faa1f9cc7c8</p>
            <p><strong>版本号:</strong> 2026.06.18</p>
            <p><strong>上传时间:</strong> <span id="uploadTime">-</span></p>
            <p><strong>状态:</strong> ✅ 已上传至微信后台</p>
        </div>

        <div class="steps">
            <h3>📱 如何获取预览二维码：</h3>
            <ol>
                <li>登录 <a href="https://mp.weixin.qq.com" target="_blank">微信公众平台</a></li>
                <li>进入「版本管理」→「开发版本」</li>
                <li>找到版本 <strong>2026.06.18</strong></li>
                <li>点击「预览」按钮，即可看到预览二维码</li>
                <li>使用微信扫描后，会自动在手机上打开小程序预览版</li>
            </ol>
        </div>

        <div class="warning">
            ⚠️ 注意：预览功能需要在微信公众平台中添加体验成员。如需添加，请联系管理员在「成员管理」→「体验成员」中操作。
        </div>

        <div class="timestamp">
            最后更新：<span id="lastUpdate">-</span>
        </div>
    </div>

    <script>
        const now = new Date();
        document.getElementById('uploadTime').textContent = now.toLocaleString('zh-CN');
        document.getElementById('lastUpdate').textContent = now.toLocaleString('zh-CN');
    </script>
</body>
</html>
